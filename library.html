<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학습 도서관 | 마음의 여정</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #11140f;
            --panel: rgba(242, 236, 220, 0.055);
            --panel-strong: rgba(242, 236, 220, 0.085);
            --line: rgba(218, 205, 171, 0.16);
            --line-strong: rgba(157, 172, 146, 0.34);
            --text: #f2efe6;
            --sub: #c6cbbd;
            --muted: #8e9688;
            --gold: #d7c899;
            --sage: #9dac92;
            --sage-soft: rgba(157, 172, 146, 0.14);
            --shadow: 0 18px 44px rgba(0, 0, 0, 0.18);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        html,
        body {
            overflow-x: hidden;
        }

        body {
            min-height: 100vh;
            background:
                linear-gradient(rgba(242, 239, 230, 0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(242, 239, 230, 0.014) 1px, transparent 1px),
                linear-gradient(180deg, #171a14 0%, #11140f 44%, #0e100d 100%);
            background-size: 42px 42px, 42px 42px, auto;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans KR', sans-serif;
            line-height: 1.75;
            -webkit-font-smoothing: antialiased;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button {
            font: inherit;
        }

        .container {
            width: min(1080px, calc(100% - 36px));
            margin: 0 auto;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid var(--line);
            background: rgba(17, 20, 15, 0.88);
            backdrop-filter: blur(10px);
        }

        .nav {
            min-height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: 'Noto Serif KR', serif;
            font-weight: 700;
        }

        .brand-mark {
            width: 22px;
            height: 22px;
            border: 1px solid var(--sage);
            transform: rotate(45deg);
            position: relative;
            flex: 0 0 auto;
        }

        .brand-mark::after {
            content: '';
            position: absolute;
            inset: 5px;
            border: 1px solid rgba(215, 200, 153, 0.75);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .nav-links a {
            color: var(--sub);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.93rem;
        }

        .nav-links a:hover,
        .nav-links a:focus-visible,
        .nav-links a[aria-current="page"] {
            background: var(--sage-soft);
            color: var(--text);
            outline: none;
        }

        main {
            padding: 58px 0 84px;
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 0.85fr) minmax(320px, 1fr);
            gap: clamp(20px, 4vw, 38px);
            align-items: center;
            margin-bottom: 28px;
        }

        .hero-copy {
            max-width: 820px;
        }

        .hero-visual {
            border: 1px solid rgba(218, 205, 171, 0.16);
            border-radius: 8px;
            overflow: hidden;
            background: rgba(8, 10, 7, 0.32);
            aspect-ratio: 4 / 3;
        }

        .hero-visual img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .eyebrow {
            display: inline-flex;
            margin-bottom: 18px;
            border: 1px solid rgba(157, 172, 146, 0.24);
            border-radius: 8px;
            background: var(--sage-soft);
            color: var(--sub);
            padding: 6px 14px;
            font-size: 0.82rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        h1,
        h2,
        h3 {
            font-family: 'Noto Serif KR', serif;
            letter-spacing: 0;
        }

        h1 {
            font-size: clamp(2.15rem, 5vw, 3.75rem);
            line-height: 1.25;
            margin-bottom: 18px;
        }

        .hero p,
        .stage-summary {
            color: var(--sub);
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        .library-shell {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: var(--shadow);
            padding: clamp(22px, 4vw, 38px);
        }

        .library-head {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 18px;
            align-items: start;
            border-bottom: 1px solid rgba(218, 205, 171, 0.12);
            padding-bottom: 24px;
            margin-bottom: 24px;
        }

        .stage-number {
            display: inline-flex;
            width: fit-content;
            border: 1px solid rgba(157, 172, 146, 0.28);
            border-radius: 8px;
            background: var(--sage-soft);
            color: var(--sub);
            padding: 5px 12px;
            font-size: 0.78rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .library-head h2 {
            font-size: clamp(1.5rem, 3vw, 2.1rem);
            margin-bottom: 8px;
        }

        .study-link {
            border: 1px solid rgba(157, 172, 146, 0.38);
            border-radius: 8px;
            color: var(--sub);
            padding: 9px 12px;
            white-space: nowrap;
        }

        .study-link:hover,
        .study-link:focus-visible {
            background: var(--sage-soft);
            color: var(--text);
            outline: none;
        }

        .chapter-nav {
            display: grid;
            grid-template-columns: 0.9fr 1.4fr 0.9fr;
            gap: 14px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 18px;
        }

        .chapter-group {
            display: grid;
            gap: 8px;
            align-content: start;
            min-width: 0;
        }

        .chapter-group-label {
            color: var(--muted);
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .chapter-btn {
            background: rgba(8, 10, 7, 0.3);
            border: 1px solid var(--line);
            border-radius: 8px;
            color: var(--sub);
            padding: 11px 12px;
            font-size: 0.9rem;
            cursor: pointer;
            text-align: left;
            line-height: 1.35;
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        .chapter-btn:hover,
        .chapter-btn:focus-visible {
            background: var(--sage-soft);
            color: var(--text);
            border-color: var(--line-strong);
            outline: none;
        }

        .chapter-btn.active {
            background: var(--gold);
            color: #171a14;
            border-color: var(--gold);
            font-weight: 700;
        }

        .reader-container {
            background: rgba(8, 10, 7, 0.4);
            border: 1px solid rgba(218, 205, 171, 0.1);
            border-radius: 8px;
            padding: clamp(20px, 4vw, 36px);
        }

        .markdown-body {
            max-width: 100%;
        }

        .markdown-body h1 {
            font-size: 1.6rem;
            color: var(--gold);
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(218, 205, 171, 0.15);
            padding-bottom: 10px;
            text-align: center;
            word-break: keep-all;
        }

        .markdown-body h2 {
            font-size: 1.32rem;
            color: var(--sage);
            margin-top: 32px;
            margin-bottom: 14px;
            border-bottom: 1px solid rgba(157, 172, 146, 0.15);
            padding-bottom: 6px;
            word-break: keep-all;
        }

        .markdown-body h3 {
            font-size: 1.12rem;
            color: var(--text);
            margin-top: 24px;
            margin-bottom: 10px;
            word-break: keep-all;
        }

        .markdown-body p,
        .markdown-body li,
        .markdown-body td,
        .markdown-body th {
            color: var(--sub);
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        .markdown-body p {
            font-size: 0.98rem;
            line-height: 1.85;
            margin-bottom: 16px;
        }

        .markdown-body ul,
        .markdown-body ol {
            margin-bottom: 20px;
            padding-left: 24px;
            display: grid;
            gap: 8px;
        }

        .markdown-body li {
            font-size: 0.96rem;
            line-height: 1.75;
        }

        .markdown-body blockquote {
            margin: 22px 0;
            padding: 16px 18px;
            border-left: 3px solid var(--sage);
            background: rgba(157, 172, 146, 0.09);
            color: var(--sub);
        }

        .markdown-body table {
            width: 100%;
            max-width: 100%;
            border-collapse: collapse;
            margin: 22px 0;
            table-layout: fixed;
        }

        .markdown-body th,
        .markdown-body td {
            border: 1px solid rgba(218, 205, 171, 0.14);
            padding: 10px;
            vertical-align: top;
        }

        .markdown-body th {
            color: var(--gold);
            background: rgba(8, 10, 7, 0.32);
        }

        .markdown-body code {
            background: rgba(8, 10, 7, 0.38);
            color: var(--text);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: Consolas, monospace;
            font-size: 0.88rem;
        }

        .markdown-body pre {
            overflow-x: auto;
            margin: 24px 0;
            border: 1px solid rgba(218, 205, 171, 0.14);
            border-radius: 8px;
            background: rgba(8, 10, 7, 0.38);
            padding: 18px;
        }

        .markdown-body pre code {
            display: block;
            background: transparent;
            padding: 0;
            color: var(--sub);
            font-size: 0.86rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: keep-all;
            overflow-wrap: anywhere;
        }

        .flow-diagram,
        .concept-diagram {
            margin: 26px 0;
            border: 1px solid rgba(218, 205, 171, 0.16);
            border-radius: 8px;
            background: rgba(242, 236, 220, 0.045);
            padding: clamp(18px, 3vw, 26px);
        }

        .flow-diagram-title,
        .concept-diagram-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
            color: var(--gold);
            font-family: 'Noto Serif KR', serif;
            font-weight: 700;
            font-size: 1.08rem;
        }

        .flow-diagram-title span,
        .concept-diagram-title span {
            color: var(--muted);
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
        }

        .flow-steps,
        .skandha-stack {
            display: grid;
            gap: 10px;
        }

        .flow-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 10px;
        }

        .flow-step,
        .skandha-root,
        .skandha-branch,
        .skandha-card,
        .skandha-note {
            border: 1px solid rgba(218, 205, 171, 0.12);
            border-radius: 8px;
            background: rgba(8, 10, 7, 0.28);
        }

        .flow-step {
            padding: 14px 16px;
            color: var(--sub);
            line-height: 1.62;
            word-break: keep-all;
        }

        .flow-step strong,
        .skandha-card strong {
            display: block;
            color: var(--text);
            margin-bottom: 4px;
        }

        .flow-step span,
        .skandha-card span {
            color: var(--muted);
            font-size: 0.86rem;
        }

        .flow-arrow {
            color: var(--gold);
            text-align: center;
            line-height: 1;
        }

        .skandha-map {
            display: grid;
            grid-template-columns: minmax(150px, 0.7fr) minmax(0, 1fr);
            gap: 14px;
        }

        .skandha-root {
            display: grid;
            place-items: center;
            padding: 22px;
            color: var(--text);
            text-align: center;
            font-family: 'Noto Serif KR', serif;
            font-size: 1.08rem;
            font-weight: 700;
        }

        .skandha-root span {
            color: var(--muted);
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.84rem;
            font-weight: 500;
        }

        .skandha-columns {
            display: grid;
            grid-template-columns: 0.7fr 1fr;
            gap: 14px;
        }

        .skandha-branch {
            padding: 16px;
        }

        .skandha-branch-title {
            color: var(--sage);
            font-size: 0.86rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .skandha-card {
            padding: 13px 14px;
        }

        .skandha-card p {
            margin: 0;
            color: var(--sub);
            font-size: 0.88rem;
            line-height: 1.55;
        }

        .skandha-note {
            margin-top: 14px;
            padding: 14px 16px;
            color: var(--sub);
            font-size: 0.91rem;
            line-height: 1.6;
        }

        .skandha-note strong {
            color: var(--gold);
        }

        footer {
            border-top: 1px solid var(--line);
            padding: 38px 0;
            color: var(--muted);
            text-align: center;
            font-size: 0.88rem;
        }

        @media (max-width: 820px) {
            .hero,
            .library-head,
            .chapter-nav,
            .skandha-map,
            .skandha-columns {
                grid-template-columns: 1fr;
            }

            .hero-visual {
                order: -1;
            }

            .study-link {
                justify-self: start;
            }
        }

        @media (max-width: 720px) {
            .nav {
                align-items: flex-start;
                padding: 12px 0;
            }

            .brand {
                padding-top: 6px;
            }

            .nav-links {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 6px;
                width: min(100%, 330px);
            }

            .nav-links a {
                padding: 8px 9px;
                font-size: 0.82rem;
                text-align: center;
                line-height: 1.25;
            }

            main {
                padding-top: 38px;
            }

            .container {
                width: min(100% - 28px, 1080px);
            }

            .reader-container {
                padding: 16px 14px;
            }

            .markdown-body h1 {
                font-size: 1.28rem;
                text-align: left;
            }

            .markdown-body h2 {
                font-size: 1.12rem;
            }

            .markdown-body table,
            .markdown-body thead,
            .markdown-body tbody,
            .markdown-body tr,
            .markdown-body th,
            .markdown-body td {
                display: block;
                width: 100%;
            }

            .markdown-body thead {
                display: none;
            }

            .markdown-body tr {
                border: 1px solid rgba(218, 205, 171, 0.14);
                border-radius: 8px;
                margin-bottom: 12px;
                overflow: hidden;
            }

            .markdown-body td {
                border: 0;
                border-bottom: 1px solid rgba(218, 205, 171, 0.1);
            }

            .markdown-body td::before {
                content: attr(data-label);
                display: block;
                color: var(--gold);
                font-size: 0.78rem;
                margin-bottom: 4px;
            }

            .flow-diagram-title,
            .concept-diagram-title {
                display: grid;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav">
            <a class="brand" href="index.html" aria-label="오늘의 말씀으로 이동">
                <span class="brand-mark" aria-hidden="true"></span>
                <span>마음의 여정</span>
            </a>
            <nav class="nav-links" aria-label="주요 페이지">
                <a href="index.html">오늘의 말씀</a>
                <a href="study.html">불교 철학 공부</a>
                <a href="library.html" aria-current="page">학습 도서관</a>
                <a href="discussion.html">토론</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <div class="hero-copy">
                <span class="eyebrow">Study Library</span>
                <h1>학습 도서관</h1>
                <p>기본 지도에서 방향을 잡은 뒤, 여기서 교재를 골라 깊이 읽습니다. 로드맵, 핵심 과정, 참고 자료를 분리해 필요한 자료만 빠르게 열 수 있게 정리했습니다.</p>
            </div>
            <figure class="hero-visual">
                <img src="assets/library-hero.png" alt="불교 교재와 주석 자료가 정리된 학습 도서관 이미지" loading="eager">
            </figure>
        </section>

        <section class="library-shell" id="library">
            <div class="library-head">
                <div>
                    <span class="stage-number">Reader</span>
                    <h2>교재 선택</h2>
                    <p class="stage-summary">본문 학습은 01~04, 보조 학습은 05~06에서 확인합니다.</p>
                </div>
                <a class="study-link" href="study.html">기본 지도 보기</a>
            </div>

            <div class="chapter-nav" role="tablist" aria-label="교재 목차">
                <div class="chapter-group">
                    <div class="chapter-group-label">길잡이</div>
                    <button type="button" class="chapter-btn active" data-chapter="00" role="tab" aria-selected="true" onclick="selectChapter('00')">00. 전체 로드맵</button>
                </div>
                <div class="chapter-group">
                    <div class="chapter-group-label">핵심 과정</div>
                    <button type="button" class="chapter-btn" data-chapter="01" role="tab" aria-selected="false" onclick="selectChapter('01')">01. 초기 불교와 괴로움의 구조</button>
                    <button type="button" class="chapter-btn" data-chapter="02" role="tab" aria-selected="false" onclick="selectChapter('02')">02. 오온, 십이처, 교학의 발전</button>
                    <button type="button" class="chapter-btn" data-chapter="03" role="tab" aria-selected="false" onclick="selectChapter('03')">03. 중관, 유식, 화엄의 사유</button>
                    <button type="button" class="chapter-btn" data-chapter="04" role="tab" aria-selected="false" onclick="selectChapter('04')">04. 선불교와 현대적 실천</button>
                </div>
                <div class="chapter-group">
                    <div class="chapter-group-label">참고 자료</div>
                    <button type="button" class="chapter-btn" data-chapter="05" role="tab" aria-selected="false" onclick="selectChapter('05')">05. 용어 사전</button>
                    <button type="button" class="chapter-btn" data-chapter="06" role="tab" aria-selected="false" onclick="selectChapter('06')">06. 경전 안내</button>
                </div>
            </div>

            <div class="reader-container">
                <div class="reader-content markdown-body" id="readerContent"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">오늘의 말씀과 불교 철학 공부</div>
    </footer>

    <script src="studyData.js?v=20260611c"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" async></script>
    <script>
        function selectChapter(chapterId) {
            const contentEl = document.getElementById('readerContent');
            if (!contentEl || typeof studyData === 'undefined' || !studyData[chapterId]) return;

            document.querySelectorAll('.chapter-btn').forEach((button) => {
                const active = button.dataset.chapter === chapterId;
                button.classList.toggle('active', active);
                button.setAttribute('aria-selected', active ? 'true' : 'false');
            });

            renderChapterContent(contentEl, studyData[chapterId].content);
            const url = new URL(window.location.href);
            url.searchParams.set('chapter', chapterId);
            history.replaceState(null, '', url.toString());
        }

        function renderChapterContent(contentEl, markdown) {
            try {
                contentEl.innerHTML = window.marked && window.marked.parse
                    ? window.marked.parse(markdown)
                    : renderBasicMarkdown(markdown);
            } catch (error) {
                contentEl.innerHTML = renderBasicMarkdown(markdown);
            }

            enhanceTables(contentEl);
            removeFileSystemLinks(contentEl);
            enhanceConceptDiagrams(contentEl);
        }

        function removeFileSystemLinks(container) {
            container.querySelectorAll('a[href^="file:"], a[href$=".md"]').forEach((link) => {
                const label = link.textContent
                    .replace(/^\d+_/, '')
                    .replace(/_/g, ' ')
                    .replace(/\.md$/i, '')
                    .trim();
                const span = document.createElement('span');
                span.textContent = label || '학습 자료';
                link.replaceWith(span);
            });
        }

        function enhanceTables(container) {
            container.querySelectorAll('table').forEach((table) => {
                const headers = Array.from(table.querySelectorAll('thead th')).map((header) => header.textContent.trim());
                table.querySelectorAll('tbody tr').forEach((row) => {
                    Array.from(row.children).forEach((cell, index) => {
                        if (headers[index]) cell.setAttribute('data-label', headers[index]);
                    });
                });
            });
        }

        function renderBasicMarkdown(markdown) {
            const escapeHtml = (value) => value
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');

            const inline = (value) => escapeHtml(value)
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>');

            const lines = markdown.split(/\r?\n/);
            let html = '';
            let inCode = false;
            let codeLines = [];
            let inList = false;
            const closeList = () => {
                if (inList) {
                    html += '</ul>';
                    inList = false;
                }
            };

            for (let index = 0; index < lines.length; index += 1) {
                const line = lines[index];
                if (line.trim().startsWith('```')) {
                    if (inCode) {
                        html += `<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`;
                        codeLines = [];
                        inCode = false;
                    } else {
                        closeList();
                        inCode = true;
                    }
                    continue;
                }

                if (inCode) {
                    codeLines.push(line);
                    continue;
                }

                if (!line.trim()) {
                    closeList();
                    continue;
                }

                if (/^\|.+\|$/.test(line.trim()) && lines[index + 1] && /^\|[\s:-]+\|/.test(lines[index + 1].trim())) {
                    closeList();
                    const headers = splitMarkdownTableRow(line).map(inline);
                    const rows = [];
                    let cursor = index + 2;
                    while (cursor < lines.length && /^\|.+\|$/.test(lines[cursor].trim())) {
                        rows.push(splitMarkdownTableRow(lines[cursor]).map(inline));
                        cursor += 1;
                    }

                    html += '<table><thead><tr>';
                    headers.forEach((header) => {
                        html += `<th>${header}</th>`;
                    });
                    html += '</tr></thead><tbody>';
                    rows.forEach((row) => {
                        html += '<tr>';
                        headers.forEach((header, cellIndex) => {
                            const label = header.replace(/<[^>]*>/g, '');
                            html += `<td data-label="${escapeHtml(label)}">${row[cellIndex] || ''}</td>`;
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    index = cursor - 1;
                    continue;
                }

                const heading = line.match(/^(#{1,3})\s+(.+)$/);
                if (heading) {
                    closeList();
                    const level = heading[1].length;
                    html += `<h${level}>${inline(heading[2])}</h${level}>`;
                    continue;
                }

                if (line.startsWith('> ')) {
                    closeList();
                    html += `<blockquote><p>${inline(line.slice(2))}</p></blockquote>`;
                    continue;
                }

                if (/^[-*]\s+/.test(line)) {
                    if (!inList) {
                        html += '<ul>';
                        inList = true;
                    }
                    html += `<li>${inline(line.replace(/^[-*]\s+/, ''))}</li>`;
                    continue;
                }

                closeList();
                html += `<p>${inline(line)}</p>`;
            }

            if (inCode) html += `<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`;
            closeList();
            return html;
        }

        function splitMarkdownTableRow(line) {
            return line
                .trim()
                .replace(/^\|/, '')
                .replace(/\|$/, '')
                .split('|')
                .map((cell) => cell.trim());
        }

        function enhanceConceptDiagrams(container) {
            container.querySelectorAll('pre code').forEach((codeBlock) => {
                const text = codeBlock.textContent || '';
                if (text.includes('인간 존재 (오온)') && text.includes('색온') && text.includes('식온')) {
                    const pre = codeBlock.closest('pre');
                    if (pre) pre.replaceWith(createSkandhaDiagram());
                    return;
                }

                const flow = getFlowDiagramData(text);
                if (flow) {
                    const pre = codeBlock.closest('pre');
                    if (pre) pre.replaceWith(createFlowDiagram(flow));
                }
            });
        }

        function getFlowDiagramData(text) {
            const includesAll = (...needles) => needles.every((needle) => text.includes(needle));

            if (includesAll('기원전 6세기', '초기 불교', '대승 철학')) {
                return {
                    title: '불교 사상의 큰 흐름',
                    caption: '시대순으로 핵심 주제가 깊어집니다',
                    layout: 'steps',
                    items: [
                        ['초기 불교', '싯다르타 고타마의 직설과 사성제, 팔정도, 근본 연기'],
                        ['부파불교와 아비달마', '법의 분석과 교학 체계의 발달'],
                        ['인도 대승과 동아시아 교종', '중관, 유식, 천태, 화엄으로 이어지는 확장'],
                        ['선불교와 현대 통섭', '직관적 수행, 논리학, 뇌과학, 참여 불교와의 연결']
                    ]
                };
            }

            if (includesAll('이론·분석적', '인간 심리', '좌선')) {
                return {
                    title: '학습 성향별 추천 루트',
                    caption: '관심사에 따라 먼저 잡을 길이 달라집니다',
                    layout: 'grid',
                    items: [
                        ['이론·분석형', '기초 사성제 → 부파 아비달마 → 중관학 → 인명학'],
                        ['심리·성찰형', '무아와 오온 → 12연기 → 유식학 → 뇌과학'],
                        ['수행·좌선형', '사념처 → 육바라밀 → 여래장 → 선불교']
                    ]
                };
            }

            if (includesAll('제행무상', '일체개고', '제법무아')) {
                return {
                    title: '삼법인의 관계',
                    caption: '변화의 통찰이 무아와 괴로움의 이해로 이어집니다',
                    layout: 'steps',
                    items: [
                        ['제행무상', '조건 지어진 모든 것은 계속 변합니다.'],
                        ['일체개고', '변하는 것에 영원을 기대하면 괴로움이 생깁니다.'],
                        ['제법무아', '현상과 열반 어디에도 고정된 자아는 없습니다.']
                    ]
                };
            }

            if (includesAll('고성제', '집성제', '멸성제', '도성제')) {
                return {
                    title: '사성제의 치유 구조',
                    caption: '진단에서 실천까지 이어지는 네 단계',
                    layout: 'grid',
                    items: [
                        ['고성제', '괴로움의 현상을 진단합니다.'],
                        ['집성제', '갈애와 집착이라는 원인을 봅니다.'],
                        ['멸성제', '번뇌가 소멸된 가능성을 확인합니다.'],
                        ['도성제', '팔정도라는 구체적인 실천법을 걷습니다.']
                    ]
                };
            }

            if (includesAll('내입처', '외입처', '십팔계')) {
                return {
                    title: '십이처에서 십팔계로',
                    caption: '감각 기관과 대상이 만나 경험의 세계가 생깁니다',
                    layout: 'steps',
                    items: [
                        ['내입처', '눈, 귀, 코, 혀, 몸, 뜻이라는 주관적 감각 기관'],
                        ['외입처', '색, 소리, 냄새, 맛, 촉감, 법이라는 객관적 대상'],
                        ['접촉', '기관과 대상이 만나 식이 발생합니다.'],
                        ['십팔계', '기관, 대상, 의식이 합쳐져 경험의 세계가 완성됩니다.']
                    ]
                };
            }

            return null;
        }

        function createFlowDiagram(data) {
            const wrapper = document.createElement('section');
            wrapper.className = 'flow-diagram';
            wrapper.setAttribute('aria-label', data.title);
            const items = data.items.map(([title, body], index) => {
                const card = `
                    <div class="flow-step">
                        <strong>${title}</strong>
                        <span>${body}</span>
                    </div>
                `;
                if (data.layout === 'steps' && index < data.items.length - 1) {
                    return `${card}<div class="flow-arrow" aria-hidden="true">↓</div>`;
                }
                return card;
            }).join('');

            wrapper.innerHTML = `
                <div class="flow-diagram-title">
                    ${data.title}
                    <span>${data.caption}</span>
                </div>
                <div class="${data.layout === 'grid' ? 'flow-grid' : 'flow-steps'}">${items}</div>
            `;
            return wrapper;
        }

        function createSkandhaDiagram() {
            const wrapper = document.createElement('section');
            wrapper.className = 'concept-diagram';
            wrapper.setAttribute('aria-label', '오온의 구성');
            wrapper.innerHTML = `
                <div class="concept-diagram-title">
                    오온의 구성
                    <span>나라는 느낌이 만들어지는 다섯 흐름</span>
                </div>
                <div class="skandha-map">
                    <div class="skandha-root">인간 존재<br><span>오온</span></div>
                    <div>
                        <div class="skandha-columns">
                            <div class="skandha-branch">
                                <div class="skandha-branch-title">물질</div>
                                <div class="skandha-card">
                                    <strong>색온</strong>
                                    <span>Form / Matter</span>
                                    <p>몸과 물질적 조건</p>
                                </div>
                            </div>
                            <div class="skandha-branch">
                                <div class="skandha-branch-title">정신</div>
                                <div class="skandha-stack">
                                    <div class="skandha-card"><strong>수온</strong><span>Feeling</span><p>정서, 고락의 감정</p></div>
                                    <div class="skandha-card"><strong>상온</strong><span>Perception</span><p>개념화, 명칭 부여</p></div>
                                    <div class="skandha-card"><strong>행온</strong><span>Mental Formations</span><p>의도, 심리 형성</p></div>
                                    <div class="skandha-card"><strong>식온</strong><span>Consciousness</span><p>종합적 식별 의식</p></div>
                                </div>
                            </div>
                        </div>
                        <div class="skandha-note"><strong>오취온:</strong> 집착이 결합할 때 자아라는 가상이 형성됩니다.</div>
                    </div>
                </div>
            `;
            return wrapper;
        }

        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const chapter = params.get('chapter');
            selectChapter(chapter && studyData[chapter] ? chapter : '00');
        });
    </script>
